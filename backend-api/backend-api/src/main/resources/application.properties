spring.application.name=backend-api

# --- CONFIGURACION DE LA CONEXION A ORACLE ---
# En Docker usa DB_URL/DB_USER/DB_PASSWORD; fuera de Docker aplica el valor por defecto.
spring.datasource.url=${DB_URL:jdbc:oracle:thin:@localhost:1522/XEPDB1}
spring.datasource.username=${DB_USER:esiligue_admin}
spring.datasource.password=${DB_PASSWORD:uca_password}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# --- CONFIGURACIÓN DE JPA / HIBERNATE ---
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true