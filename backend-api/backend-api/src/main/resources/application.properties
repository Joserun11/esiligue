spring.application.name=backend-api

# --- CONFIGURACIÓN DE LA CONEXIÓN A ORACLE DOCK ---
spring.datasource.url=jdbc:oracle:thin:@oracle_esiligue:1521/xe
spring.datasource.username=system
spring.datasource.password=uca_password
